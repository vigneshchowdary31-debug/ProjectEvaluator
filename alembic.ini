# Alembic Configuration
# This file is used by Alembic for database migration management.

[alembic]
# Path to the Alembic migration environment.
script_location = alembic

# Template used to generate migration scripts.
# file_template = %%(rev)s_%%(slug)s

# sys.path prepend for PYTHONPATH (comma-separated).
prepend_sys_path = .

# Timezone for revision creation date.
# timezone =

# Max length of the slug field in migration filenames.
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command.
# revision_environment = false

# Set to 'true' to generate comments in migration script.
# output_encoding = utf-8

# DATABASE_URL is read from app.config (not hardcoded here).
# The actual connection string comes from .env via app.config.get_settings().
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Hooks to format migration scripts after generation.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
