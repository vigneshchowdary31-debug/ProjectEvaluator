name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest ruff bandit

      - name: Lint check (Ruff)
        run: |
          # Check for errors, warnings, and formatting issues
          ruff check app/

      - name: Security Audit (Bandit)
        run: |
          # Scan codebase for common security vulnerability issues
          bandit -r app/

      - name: Run Tests (Pytest)
        env:
          DATABASE_URL: "sqlite:///./test_platform.db"
          SECRET_KEY: "test-secret-key-for-jwt"
          ADMIN_EMAIL: "admin@test.com"
          ADMIN_PASSWORD: "testpassword"
        run: |
          pytest

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Verify Frontend Compilation
        working-directory: frontend
        run: npm run build
